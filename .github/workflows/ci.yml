name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  api-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: aisle_shopper_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/aisle_shopper_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:api:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage
          path: coverage

  app-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:app:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-coverage
          path: coverage

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: aisle_shopper_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/aisle_shopper_test
      EXPO_PUBLIC_API_URL: http://127.0.0.1:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run api:schema
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: test-results

  tests:
    runs-on: ubuntu-latest
    needs:
      - static
      - api-tests
      - app-tests
      - e2e
    steps:
      - run: echo "All required checks passed."

  api-image:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - name: Build API Docker image
        run: docker build -f api/Dockerfile -t aisle-shopper-api:${{ github.sha }} .
      - name: Save API Docker image artifact
        run: |
          mkdir -p artifacts
          docker save aisle-shopper-api:${{ github.sha }} -o artifacts/aisle-shopper-api.tar
      - uses: actions/upload-artifact@v4
        with:
          name: aisle-shopper-api-image
          path: artifacts/aisle-shopper-api.tar

  android-apk:
    runs-on: ubuntu-latest
    needs: tests
    environment: preview
    env:
      EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL || vars.EXPO_PUBLIC_API_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY || vars.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL || vars.EXPO_PUBLIC_SUPABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - name: Validate APK build environment
        run: |
          missing=0
          for name in EXPO_PUBLIC_API_URL EXPO_PUBLIC_SUPABASE_ANON_KEY EXPO_PUBLIC_SUPABASE_URL; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for the APK build. Set it as a repository secret or variable."
              missing=1
            fi
          done
          exit "$missing"
      - name: Generate Android project
        run: npx expo prebuild --platform android --non-interactive --clean
      - name: Build standalone APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
      - name: Verify APK contains bundled JavaScript
        run: |
          apk="$(find android/app/build/outputs/apk/release -name '*.apk' -print -quit)"
          if [ -z "$apk" ]; then
            echo "::error::Release APK was not created."
            exit 1
          fi
          if ! unzip -l "$apk" | grep -q 'assets/index.android.bundle'; then
            echo "::error::Release APK is missing assets/index.android.bundle."
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: aisle-shopper-apk
          path: android/app/build/outputs/apk/release/*.apk
